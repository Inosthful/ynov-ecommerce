name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: node --test tests/exo.unit.test.js

  integration:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    needs: unit  # ne démarre que si le job "unit" passe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: node --test tests/exo.integration.test.js tests/orders.test.js tests/products.test.js
